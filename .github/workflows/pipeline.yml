name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true

      - name: Test
        run: make test
        
      - name: Build All
        run: make build-all

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/*

  scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist/

      - name: Run Scan
        run: |
          chmod +x dist/euprovguard-linux-amd64
          ./dist/euprovguard-linux-amd64 -path . -bundle compliance-report > scan.log 2>&1
          cat scan.log

      - name: Check for Findings
        run: |
          if grep -q "CVEs: [1-9]" scan.log; then
            echo "Security findings detected. Failing pipeline."
            exit 1
          fi

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compliance-reports
          path: compliance-report.*

  release:
    needs: [build, scan]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/binaries/*
            artifacts/compliance-reports/*
